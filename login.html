<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login · Bishnupriya Fuels</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232563eb'><path d='M19 5v2h-4V5h4m-6 0v2H9V5h4m-6 0v2H5V5h4m15 6v2h-4v-2h4m-6 0v2H9v-2h4m-6 0v2H5v-2h4m15 6v2h-4v-2h4m-6 0v2H9v-2h4m-6 0v2H5v-2h4'/></svg>" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/login.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3"></script>
    <script defer src="js/env.js"></script>
    <script defer src="js/errorHandler.js"></script>
    <script defer src="js/cache.js"></script>
    <script defer src="js/utils.js?v=4"></script>
    <script defer src="js/supabase.js"></script>
    <script defer src="js/auth.js"></script>
  </head>
  <body class="login-page">
    <main class="login-card card">
      <div class="login-brand">
        <span class="login-logo" aria-hidden="true">
          <img src="assets/bpcl-logo.png" alt="" width="48" height="58" decoding="async" />
        </span>
        <h1>Bishnupriya Fuels</h1>
        <p class="login-tagline">Authorized BPCL Dealer · Operator portal</p>
      </div>
      <p class="muted">Sign in to manage daily operations, credit, billing, and reports.</p>

      <form id="login-form" class="form" autocomplete="on">
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          placeholder="operator@fnsventures.in"
          required
        />

        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          placeholder="Enter password"
          minlength="6"
          required
        />

        <button type="submit" id="login-button">Login</button>
        <p class="muted login-forgot">
          <a href="#" id="forgot-password-link">Forgot password?</a>
        </p>
        <p id="login-error" class="error hidden"></p>
      </form>
    </main>
    <footer class="app-footer app-footer--minimal">
      <p class="footer-copyright">© 2025 F&S Ventures. All rights reserved.</p>
    </footer>
  </body>
</html>
