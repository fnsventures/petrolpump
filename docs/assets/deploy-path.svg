<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" role="img" aria-label="Deploy branches: feature to staging to production">
  <defs>
    <linearGradient id="dp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="dp-lane" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <filter id="dp-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="dp-a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#38bdf8"/></marker>
    <marker id="dp-a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#34d399"/></marker>
  </defs>

  <rect width="700" height="240" rx="18" fill="url(#dp-bg)" stroke="#1e3a5f"/>
  <text x="350" y="34" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="10" letter-spacing="4">DEPLOY PATH</text>

  <!-- lanes -->
  <rect x="30" y="58" width="190" height="138" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1" stroke-dasharray="5 5"/>
  <rect x="255" y="58" width="190" height="138" rx="10" fill="#0c1929" stroke="#38bdf8" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="480" y="58" width="190" height="138" rx="10" fill="#071510" stroke="#34d399" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
  </rect>

  <rect x="30" y="58" width="640" height="138" rx="10" fill="url(#dp-lane)" opacity="0.25">
    <animate attributeName="x" values="-200;60;-200" dur="4s" repeatCount="indefinite"/>
  </rect>

  <text x="125" y="82" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="10" letter-spacing="2">DEVELOP</text>
  <text x="350" y="82" text-anchor="middle" fill="#38bdf8" font-family="ui-monospace,monospace" font-size="10" letter-spacing="2">STAGING</text>
  <text x="575" y="82" text-anchor="middle" fill="#34d399" font-family="ui-monospace,monospace" font-size="10" letter-spacing="2">PRODUCTION</text>

  <rect x="62" y="108" width="126" height="40" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="125" y="133" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="11">feature/*</text>

  <rect x="287" y="108" width="126" height="40" rx="6" fill="#0c1929" stroke="#38bdf8" stroke-width="2" filter="url(#dp-glow)"/>
  <text x="350" y="133" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="11">staging</text>

  <rect x="512" y="108" width="126" height="40" rx="6" fill="#0a1a12" stroke="#34d399" stroke-width="2" filter="url(#dp-glow)"/>
  <text x="575" y="133" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="11">main</text>

  <!-- data links -->
  <path d="M 188 128 L 282 128" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <path d="M 413 128 L 507 128" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <path d="M 188 128 L 282 128" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="6 8" marker-end="url(#dp-a1)">
    <animate attributeName="stroke-dashoffset" values="28;0" dur="1s" repeatCount="indefinite"/>
  </path>
  <path d="M 413 128 L 507 128" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="6 8" marker-end="url(#dp-a2)">
    <animate attributeName="stroke-dashoffset" values="28;0" dur="1s" begin="0.35s" repeatCount="indefinite"/>
  </path>

  <!-- packets -->
  <rect width="28" height="16" rx="4" fill="#38bdf8" opacity="0.95" filter="url(#dp-glow)">
    <animate attributeName="x" values="192;255;192" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="120;120;120" dur="2.2s" repeatCount="indefinite"/>
  </rect>
  <rect width="28" height="16" rx="4" fill="#34d399" opacity="0.95" filter="url(#dp-glow)">
    <animate attributeName="x" values="417;480;417" dur="2.2s" begin="0.55s" repeatCount="indefinite"/>
    <animate attributeName="y" values="120;120;120" dur="2.2s" begin="0.55s" repeatCount="indefinite"/>
  </rect>

  <text x="125" y="178" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="9">local dev</text>
  <text x="350" y="178" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="9">/staging/</text>
  <text x="575" y="178" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="9">live site</text>
  <text x="350" y="218" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="10">GitHub Actions deploys on push &#183; manual workflow available</text>
</svg>
