<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" role="img" aria-label="Deploy branches: feature to staging to production">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="700" height="220" rx="16" fill="url(#bg5)" stroke="#1e3a5f"/>
  <text x="350" y="28" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="12" letter-spacing="2">DEPLOY PATH</text>
  <!-- lanes -->
  <rect x="40" y="55" width="180" height="130" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>
  <rect x="260" y="55" width="180" height="130" rx="12" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
  <rect x="480" y="55" width="180" height="130" rx="12" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <text x="130" y="78" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="11">DEVELOP</text>
  <text x="350" y="78" text-anchor="middle" fill="#38bdf8" font-family="system-ui" font-size="11">STAGING</text>
  <text x="570" y="78" text-anchor="middle" fill="#34d399" font-family="system-ui" font-size="11">PRODUCTION</text>
  <!-- nodes -->
  <rect x="70" y="100" width="120" height="36" rx="8" fill="#1e293b" stroke="#64748b"/>
  <text x="130" y="123" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="11">feature/*</text>
  <rect x="290" y="100" width="120" height="36" rx="8" fill="#0c1929" stroke="#38bdf8"/>
  <text x="350" y="123" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="11">staging</text>
  <rect x="510" y="100" width="120" height="36" rx="8" fill="#0a1a12" stroke="#34d399"/>
  <text x="570" y="123" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="11">main</text>
  <!-- arrows -->
  <path d="M 190 118 L 285 118" stroke="#38bdf8" stroke-width="2" marker-end="url(#a1)" fill="none"/>
  <path d="M 410 118 L 505 118" stroke="#34d399" stroke-width="2" marker-end="url(#a2)" fill="none"/>
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#38bdf8"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#34d399"/></marker>
  </defs>
  <!-- animated packets -->
  <rect width="24" height="14" rx="4" fill="#38bdf8" opacity="0.9">
    <animate attributeName="x" values="195;260;195" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="y" values="111;111;111" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect width="24" height="14" rx="4" fill="#34d399" opacity="0.9">
    <animate attributeName="x" values="415;480;415" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="y" values="111;111;111" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
  <text x="130" y="165" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">local dev</text>
  <text x="350" y="165" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">/staging/</text>
  <text x="570" y="165" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="9">live site</text>
  <text x="350" y="200" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">GitHub Actions deploys on push &#183; manual workflow also available</text>
</svg>
