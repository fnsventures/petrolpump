<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" role="img" aria-label="Deploy branches: feature to staging to production">
  <defs>
    <linearGradient id="dp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/><stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="dp-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="700" height="280" rx="16" fill="url(#dp-bg)" stroke="#1e3a5f"/>
  <rect x="0" width="700" height="2" fill="#38bdf8" opacity="0.12">
    <animate attributeName="y" values="-4;284;-4" dur="5s" repeatCount="indefinite"/>
  </rect>
  <text x="350" y="28" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="10" letter-spacing="2">BRANCH PROMOTION</text>
  <text x="350" y="44" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="10">Code must pass staging before reaching production</text>

  <!-- env lanes -->
  <rect x="30" y="62" width="190" height="140" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="1;1;0.35;0.35;0.35;1" keyTimes="0;0.12;0.16;0.84;0.88;1" dur="10s" repeatCount="indefinite"/>
  </rect>
  <rect x="255" y="62" width="190" height="140" rx="10" fill="#0c1929" stroke="#38bdf8" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.35;0.35;1;1;0.35;0.35" keyTimes="0;0.28;0.32;0.64;0.68;1" dur="10s" repeatCount="indefinite"/>
  </rect>
  <rect x="480" y="62" width="190" height="140" rx="10" fill="#071510" stroke="#34d399" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.35;0.35;0.35;0.35;1;1" keyTimes="0;0.56;0.6;0.64;0.68;1" dur="10s" repeatCount="indefinite"/>
  </rect>

  <text x="125" y="86" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="9">LOCAL</text>
  <text x="350" y="86" text-anchor="middle" fill="#38bdf8" font-family="ui-monospace,monospace" font-size="9">STAGING</text>
  <text x="575" y="86" text-anchor="middle" fill="#34d399" font-family="ui-monospace,monospace" font-size="9">PRODUCTION</text>

  <rect x="62" y="112" width="126" height="44" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="1;1;0.35;0.35;0.35;1" keyTimes="0;0.12;0.16;0.84;0.88;1" dur="10s" repeatCount="indefinite"/>
  </rect>
  <text x="125" y="130" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="8">branch</text>
  <text x="125" y="146" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="11">feature/*</text>

  <rect x="287" y="112" width="126" height="44" rx="6" fill="#0c1929" stroke="#38bdf8" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.35;0.35;1;1;0.35;0.35" keyTimes="0;0.28;0.32;0.64;0.68;1" dur="10s" repeatCount="indefinite"/>
  </rect>
  <text x="350" y="130" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="8">branch</text>
  <text x="350" y="146" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="11">staging</text>

  <rect x="512" y="112" width="126" height="44" rx="6" fill="#0a1a12" stroke="#34d399" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.35;0.35;0.35;0.35;1;1" keyTimes="0;0.56;0.6;0.64;0.68;1" dur="10s" repeatCount="indefinite"/>
  </rect>
  <text x="575" y="130" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="8">branch</text>
  <text x="575" y="146" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="11">main</text>

  <path d="M 188 134 L 282 134" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <path d="M 413 134 L 507 134" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <circle r="3" fill="#38bdf8" opacity="0">
    <animateMotion dur="0.8s" repeatCount="indefinite" path="M 188 134 L 282 134"/>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.14;0.18;0.32;0.36;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#34d399" opacity="0">
    <animateMotion dur="0.8s" repeatCount="indefinite" path="M 413 134 L 507 134"/>
    <animate attributeName="opacity" values="0;0;0;0;1;1;0;0" keyTimes="0;0.42;0.46;0.5;0.54;0.68;0.72;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <text x="235" y="124" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="7" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.14;0.18;0.32;0.36;1" dur="10s" repeatCount="indefinite"/>
    merge PR
  </text>
  <text x="460" y="124" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="7" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1;1;0;0" keyTimes="0;0.42;0.46;0.5;0.54;0.68;0.72;1" dur="10s" repeatCount="indefinite"/>
    after QA
  </text>

  <!-- commit chip -->
  <g filter="url(#dp-glow)">
    <rect width="56" height="22" rx="5" fill="#0f172a" stroke="#64748b" stroke-width="1.5">
      <animate attributeName="x" values="97;97;304;304;529;529;97" keyTimes="0;0.1;0.22;0.42;0.54;0.86;1" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="y" values="123;123;123;123;123;123;123" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="stroke" values="#64748b;#64748b;#38bdf8;#38bdf8;#34d399;#34d399;#64748b" keyTimes="0;0.1;0.22;0.42;0.54;0.86;1" dur="10s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text font-family="ui-monospace,monospace" font-size="8" fill="#e2e8f0" text-anchor="middle">
    <animate attributeName="x" values="125;125;332;332;557;557;125" keyTimes="0;0.1;0.22;0.42;0.54;0.86;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="y" values="138;138;138;138;138;138;138" dur="10s" repeatCount="indefinite"/>
    git push
  </text>
  <rect width="56" height="22" rx="5" fill="#64748b" opacity="0.15">
    <animate attributeName="x" values="93;93;300;300;525;525;93" keyTimes="0;0.1;0.22;0.42;0.54;0.86;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="y" values="123;123;123;123;123;123;123" dur="10s" repeatCount="indefinite"/>
  </rect>

  <!-- deploy rockets per env -->
  <text x="125" y="178" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="8">npm run dev</text>
  <text x="350" y="178" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="8" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.35;1;1;0.35;0.35" keyTimes="0;0.28;0.32;0.64;0.68;1" dur="10s" repeatCount="indefinite"/>
    GH Actions &#8594; /staging/
  </text>
  <text x="575" y="178" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="8" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.35;0.35;0.35;1;1" keyTimes="0;0.56;0.6;0.64;0.68;1" dur="10s" repeatCount="indefinite"/>
    GH Actions &#8594; live site
  </text>

  <!-- status badges -->
  <text x="125" y="198" text-anchor="middle" fill="#475569" font-family="ui-monospace,monospace" font-size="8" opacity="0">
    <animate attributeName="opacity" values="1;1;0;0;0;1" keyTimes="0;0.12;0.16;0.84;0.88;1" dur="10s" repeatCount="indefinite"/>
    BUILDING...
  </text>
  <text x="350" y="198" text-anchor="middle" fill="#38bdf8" font-family="ui-monospace,monospace" font-size="8" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.28;0.32;0.64;0.68;1" dur="10s" repeatCount="indefinite"/>
    TESTING...
  </text>
  <text x="575" y="198" text-anchor="middle" fill="#34d399" font-family="ui-monospace,monospace" font-size="8" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0;0.56;0.6;0.64;0.68;1" dur="10s" repeatCount="indefinite"/>
    LIVE
  </text>

  <rect x="60" y="228" width="580" height="28" rx="6" fill="#0f172a" stroke="#334155"/>
  <text x="350" y="246" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="8">
    <animate attributeName="opacity" values="1;1;0;1;1;0;1;1" keyTimes="0;0.1;0.14;0.16;0.42;0.46;0.48;1" dur="10s" repeatCount="indefinite"/>
    Step 1: develop on feature branch locally
  </text>
  <text x="350" y="246" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="8" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0;0;0" keyTimes="0;0.22;0.26;0.42;0.46;0.96;1;1" dur="10s" repeatCount="indefinite"/>
    Step 2: merge to staging, verify on /staging/
  </text>
  <text x="350" y="246" text-anchor="middle" fill="#34d399" font-family="ui-monospace,monospace" font-size="8" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1;1;0;0" keyTimes="0;0.54;0.58;0.62;0.66;0.9;0.94;1" dur="10s" repeatCount="indefinite"/>
    Step 3: merge staging to main &#8594; customers see update
  </text>
</svg>
