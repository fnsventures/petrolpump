<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 460" role="img" aria-label="Login and provision flow">
  <defs>
    <linearGradient id="af-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="af-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#34d399"/>
    </marker>
    <marker id="af-arrow-bad" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f87171"/>
    </marker>
  </defs>

  <rect width="480" height="460" rx="16" fill="url(#af-bg)" stroke="#1e3a5f"/>
  <text x="240" y="32" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="10" letter-spacing="3">SIGN-IN &#8594; AUTH &#8594; ROLE CHECK &#8594; APP</text>

  <line x1="240" y1="68" x2="240" y2="400" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>

  <!-- session token traveling the happy path -->
  <circle r="6" fill="#00d4ff">
    <animate attributeName="cx" values="240;240;240;240;382;240" keyTimes="0;0.12;0.38;0.55;0.72;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="68;92;162;242;318;388" keyTimes="0;0.12;0.38;0.55;0.72;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;1;1;0" keyTimes="0;0.08;0.12;0.7;0.88;0.96;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <text font-family="ui-monospace,monospace" font-size="7" fill="#e2e8f0" text-anchor="middle" opacity="0">
    <animate attributeName="x" values="240;240;240;240;382;240" keyTimes="0;0.12;0.38;0.55;0.72;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="y" values="58;82;152;232;308;378" keyTimes="0;0.12;0.38;0.55;0.72;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;1;1;1;0" keyTimes="0;0.34;0.38;0.7;0.88;0.96;1" dur="10s" repeatCount="indefinite"/>
    JWT
  </text>

  <!-- failed path token (brief) -->
  <circle r="4" fill="#f87171" opacity="0">
    <animate attributeName="cx" values="240;98" keyTimes="0;1" dur="10s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="242;318" keyTimes="0;1" dur="10s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0;0.8;0.8;0;0" keyTimes="0;0.52;0.56;0.58;0.66;0.7;1" dur="10s" repeatCount="indefinite"/>
  </circle>

  <g transform="translate(240,92)">
    <rect x="-108" y="-24" width="216" height="48" rx="6" fill="#0f172a" stroke="#64748b" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="1;1;0.3;0.3;0.3;1" keyTimes="0;0.14;0.18;0.88;0.92;1" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text text-anchor="middle" y="5" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="12">login.html</text>
  </g>

  <g transform="translate(240,162)">
    <rect x="-118" y="-26" width="236" height="52" rx="6" fill="#0c1929" stroke="#38bdf8" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.3;0.3;1;1;0.3;0.3" keyTimes="0;0.16;0.2;0.4;0.44;1" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text text-anchor="middle" y="-4" fill="#38bdf8" font-family="system-ui" font-size="12" font-weight="600">Supabase Auth</text>
    <text text-anchor="middle" y="16" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="10">email + password</text>
  </g>

  <g transform="translate(240,242)">
    <rect x="-128" y="-30" width="256" height="60" rx="6" fill="#1a1508" stroke="#fbbf24" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.3;0.3;0.3;1;1;0.3" keyTimes="0;0.38;0.42;0.46;0.68;0.72" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text text-anchor="middle" y="-4" fill="#fbbf24" font-family="system-ui" font-size="12" font-weight="600">public.users row?</text>
    <text text-anchor="middle" y="16" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="10">RLS checks role</text>
  </g>

  <g transform="translate(98,318)">
    <rect x="-78" y="-24" width="156" height="48" rx="6" fill="#180808" stroke="#f87171" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.3;0.3;0.3;0.3;1;1;0.3" keyTimes="0;0.52;0.56;0.58;0.6;0.68;0.72" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text text-anchor="middle" y="5" fill="#f87171" font-family="ui-monospace,monospace" font-size="10">NO ROW</text>
    <text text-anchor="middle" y="18" fill="#64748b" font-family="ui-monospace,monospace" font-size="8">empty screens</text>
  </g>

  <g transform="translate(382,318)">
    <rect x="-78" y="-24" width="156" height="48" rx="6" fill="#071510" stroke="#34d399" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.3;0.3;0.3;0.3;0.3;1;1;0.3" keyTimes="0;0.56;0.6;0.64;0.68;0.72;0.88;0.92" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text text-anchor="middle" y="5" fill="#34d399" font-family="ui-monospace,monospace" font-size="10">ROW FOUND</text>
    <text text-anchor="middle" y="18" fill="#64748b" font-family="ui-monospace,monospace" font-size="8">role loaded</text>
  </g>

  <path d="M 240 272 L 98 294" fill="none" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#af-arrow-bad)" opacity="0.5"/>
  <path d="M 240 272 L 382 294" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#af-arrow)">
    <animate attributeName="opacity" values="0.3;0.3;0.3;0.3;1;1;0.3" keyTimes="0;0.56;0.6;0.68;0.72;0.88;0.92" dur="10s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(240,408)">
    <rect x="-118" y="-24" width="236" height="48" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.3;0.3;0.3;0.3;0.3;0.3;1;1" keyTimes="0;0.68;0.72;0.76;0.8;0.84;0.88;1" dur="10s" repeatCount="indefinite"/>
    </rect>
    <text text-anchor="middle" y="5" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="11">dashboard.html + role nav</text>
  </g>
</svg>
