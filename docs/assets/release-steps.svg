<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" role="img" aria-label="Release pipeline: sync, staging, migrate, production">
  <defs>
    <linearGradient id="rl-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/><stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <rect width="900" height="260" rx="16" fill="url(#rl-bg)" stroke="#1e3a5f"/>
  <text x="450" y="28" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="10" letter-spacing="2.5">RELEASE PIPELINE</text>
  <text x="450" y="46" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="12">Always in this order  sync ` deploy ` migrate ` go-live</text>

  <!-- Progress track -->
  <rect x="50" y="120" width="800" height="6" rx="3" fill="#1e293b"/>
  <rect x="50" y="120" height="6" rx="3" fill="#00d4ff">
    <animate attributeName="width" values="0;200;200;400;400;600;600;800;800;0" keyTimes="0;0.12;0.2;0.32;0.4;0.55;0.65;0.85;0.92;1" dur="10s" repeatCount="indefinite"/>
  </rect>

  <!-- A -->
  <circle cx="150" cy="123" r="18" fill="#0c1929" stroke="#38bdf8" stroke-width="2">
    <animate attributeName="fill" values="#0c1929;#082f49;#0c1929;#0c1929" keyTimes="0;0.12;0.2;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <text x="150" y="128" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="12">A</text>
  <text x="150" y="170" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13">Sync data</text>
  <text x="150" y="188" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="10">db.sh sync</text>

  <!-- B -->
  <circle cx="350" cy="123" r="18" fill="#0c1929" stroke="#38bdf8" stroke-width="2">
    <animate attributeName="fill" values="#0c1929;#0c1929;#082f49;#0c1929;#0c1929" keyTimes="0;0.2;0.32;0.4;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <text x="350" y="128" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="12">B</text>
  <text x="350" y="170" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13">Deploy staging</text>
  <text x="350" y="188" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="10">push staging</text>

  <!-- C -->
  <circle cx="550" cy="123" r="18" fill="#0c1929" stroke="#fbbf24" stroke-width="2">
    <animate attributeName="fill" values="#0c1929;#0c1929;#0c1929;#422006;#0c1929;#0c1929" keyTimes="0;0.4;0.45;0.55;0.65;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <text x="550" y="128" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="12">C</text>
  <text x="550" y="170" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13">Migrate (if any)</text>
  <text x="550" y="188" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="10">migrate --apply</text>

  <!-- D -->
  <circle cx="750" cy="123" r="18" fill="#0c1929" stroke="#34d399" stroke-width="2">
    <animate attributeName="fill" values="#0c1929;#0c1929;#0c1929;#0c1929;#052e16;#052e16" keyTimes="0;0.65;0.7;0.75;0.85;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <text x="750" y="128" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace,monospace" font-size="12">D</text>
  <text x="750" y="170" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13">Go live</text>
  <text x="750" y="188" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="10">merge ’ main</text>

  <text x="450" y="235" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="11">
    Full steps ’ docs/OPERATIONS.md
  </text>
</svg>
