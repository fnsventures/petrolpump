<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 240" role="img" aria-label="Quick start: Configure, Run, Provision">
  <defs>
    <linearGradient id="qs-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="qs-beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0070c0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0070c0" stop-opacity="0"/>
    </linearGradient>
    <filter id="qs-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="820" height="240" rx="16" fill="url(#qs-bg)" stroke="#1e3a5f"/>
  <text x="410" y="32" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="10" letter-spacing="3">QUICK START  -  CONFIGURE &#8594; RUN &#8594; PROVISION</text>

  <!-- tracks -->
  <path d="M 155 120 L 255 120" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <path d="M 401 120 L 501 120" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <path id="qs-leg1" d="M 155 120 L 255 120" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="6 8" opacity="0">
    <animate attributeName="opacity" values="0;0;0.9;0.9;0;0" keyTimes="0;0.22;0.24;0.38;0.4;1" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dashoffset" values="28;0;0;0;0;0" keyTimes="0;0.22;0.38;0.4;1;1" dur="12s" repeatCount="indefinite"/>
  </path>
  <path id="qs-leg2" d="M 401 120 L 501 120" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="6 8" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0.9;0.9;0;0" keyTimes="0;0.48;0.5;0.52;0.54;0.72;0.74;1" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dashoffset" values="0;0;0;28;0;0;0;0" keyTimes="0;0.5;0.52;0.54;0.72;0.74;1;1" dur="12s" repeatCount="indefinite"/>
  </path>

  <!-- traveling config token -->
  <g filter="url(#qs-glow)">
    <circle r="7" fill="#00d4ff">
      <animate attributeName="cx" values="82;82;328;328;574;574;82" keyTimes="0;0.18;0.28;0.48;0.58;0.88;1" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="120;120;120;120;120;120;120" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text font-family="ui-monospace,monospace" font-size="8" fill="#e2e8f0" text-anchor="middle">
    <animate attributeName="x" values="82;82;328;328;574;574;82" keyTimes="0;0.18;0.28;0.48;0.58;0.88;1" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="y" values="108;108;108;108;108;108;108" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;1;1;1;1;0" keyTimes="0;0.16;0.26;0.46;0.56;0.86;1" dur="12s" repeatCount="indefinite"/>
    keys
  </text>

  <!-- step 1 -->
  <g transform="translate(82,120)">
    <rect x="-62" y="-48" width="124" height="96" rx="10" fill="#0f172a" stroke="#00d4ff" stroke-width="2">
      <animate attributeName="stroke-opacity" values="1;1;0.25;0.25;0.25;0.25;1" keyTimes="0;0.28;0.32;0.88;0.92;0.96;1" dur="12s" repeatCount="indefinite"/>
    </rect>
    <text y="-18" text-anchor="middle" fill="#00d4ff" font-family="ui-monospace,monospace" font-size="10">STEP 1</text>
    <text y="2" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Configure</text>
    <text y="20" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="9">cp env.example.js</text>
    <text y="34" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="9">paste Supabase keys</text>
    <text y="52" text-anchor="middle" fill="#34d399" font-family="ui-monospace,monospace" font-size="8" opacity="0">
      <animate attributeName="opacity" values="1;1;0;0;0;0;0" keyTimes="0;0.26;0.3;0.88;0.92;0.96;1" dur="12s" repeatCount="indefinite"/>
      &#10003; env.js ready
    </text>
  </g>

  <!-- step 2 -->
  <g transform="translate(328,120)">
    <rect x="-62" y="-48" width="124" height="96" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.25;0.25;1;1;0.25;0.25;0.25" keyTimes="0;0.28;0.32;0.68;0.72;0.96;1" dur="12s" repeatCount="indefinite"/>
    </rect>
    <text y="-18" text-anchor="middle" fill="#38bdf8" font-family="ui-monospace,monospace" font-size="10">STEP 2</text>
    <text y="2" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Run</text>
    <text y="20" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="9">npm run dev</text>
    <text y="34" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="9">localhost:3000</text>
    <text y="52" text-anchor="middle" fill="#34d399" font-family="ui-monospace,monospace" font-size="8" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0;0" keyTimes="0;0.48;0.52;0.66;0.7;0.96;1" dur="12s" repeatCount="indefinite"/>
      &#10003; app serving
    </text>
  </g>

  <!-- step 3 -->
  <g transform="translate(574,120)">
    <rect x="-62" y="-48" width="124" height="96" rx="10" fill="#0f172a" stroke="#34d399" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.25;0.25;0.25;0.25;1;1;0.25" keyTimes="0;0.56;0.6;0.68;0.72;0.92;1" dur="12s" repeatCount="indefinite"/>
    </rect>
    <text y="-18" text-anchor="middle" fill="#34d399" font-family="ui-monospace,monospace" font-size="10">STEP 3</text>
    <text y="2" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Provision</text>
    <text y="20" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="9">Auth user + SQL row</text>
    <text y="34" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="9">public.users</text>
    <text y="52" text-anchor="middle" fill="#34d399" font-family="ui-monospace,monospace" font-size="8" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.68;0.72;0.76;0.8;0.92;1" dur="12s" repeatCount="indefinite"/>
      &#10003; dashboard access
    </text>
  </g>

  <text x="82" y="210" text-anchor="middle" fill="#475569" font-family="ui-monospace,monospace" font-size="9">~2 min</text>
  <text x="328" y="210" text-anchor="middle" fill="#475569" font-family="ui-monospace,monospace" font-size="9">~1 min</text>
  <text x="574" y="210" text-anchor="middle" fill="#475569" font-family="ui-monospace,monospace" font-size="9">~3 min</text>
</svg>
