<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 220" role="img" aria-label="Quick start: Configure, Run, Provision">
  <defs>
    <linearGradient id="qs-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="50%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="qs-beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0070c0" stop-opacity="0"/>
      <stop offset="45%" stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="qs-node1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0070c0"/>
    </linearGradient>
    <linearGradient id="qs-node2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="qs-node3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="qs-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="qs-soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="820" height="220" rx="18" fill="url(#qs-bg)" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="1" y="1" width="818" height="218" rx="17" fill="none" stroke="url(#qs-beam)" stroke-width="1" opacity="0.35">
    <animate attributeName="opacity" values="0.2;0.55;0.2" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- HUD corners -->
  <path d="M18 34 H44 M18 34 V60" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
  <path d="M802 34 H776 M802 34 V60" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
  <path d="M18 186 H44 M18 186 V160" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.7"/>
  <path d="M802 186 H776 M802 186 V160" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.7"/>

  <!-- grid -->
  <g opacity="0.12" stroke="#00d4ff" stroke-width="0.5">
    <path d="M0 55 H820 M0 110 H820 M0 165 H820"/>
    <path d="M137 0 V220 M328 0 V220 M492 0 V220 M683 0 V220"/>
  </g>

  <!-- scan line -->
  <rect x="0" width="820" height="3" fill="url(#qs-beam)" opacity="0.25">
    <animate attributeName="y" values="-10;230;-10" dur="4.5s" repeatCount="indefinite"/>
  </rect>

  <text x="410" y="34" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="10" letter-spacing="4">QUICK START SEQUENCE</text>

  <!-- connection tracks -->
  <path d="M 155 110 L 255 110" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <path d="M 401 110 L 501 110" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <path d="M 155 110 L 255 110" fill="none" stroke="url(#qs-beam)" stroke-width="2" stroke-dasharray="8 10" opacity="0.8">
    <animate attributeName="stroke-dashoffset" values="36;0" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <path d="M 401 110 L 501 110" fill="none" stroke="url(#qs-beam)" stroke-width="2" stroke-dasharray="8 10" opacity="0.8">
    <animate attributeName="stroke-dashoffset" values="36;0" dur="1.1s" begin="0.35s" repeatCount="indefinite"/>
  </path>

  <!-- energy packets -->
  <circle r="4" fill="#00d4ff" filter="url(#qs-glow)">
    <animateMotion dur="2s" repeatCount="indefinite" path="M 155 110 L 255 110"/>
  </circle>
  <circle r="4" fill="#a855f7" filter="url(#qs-glow)">
    <animateMotion dur="2s" begin="0.7s" repeatCount="indefinite" path="M 401 110 L 501 110"/>
  </circle>
  <circle r="8" fill="#00d4ff" opacity="0.25" filter="url(#qs-soft)">
    <animateMotion dur="2s" repeatCount="indefinite" path="M 155 110 L 255 110"/>
  </circle>
  <circle r="8" fill="#a855f7" opacity="0.25" filter="url(#qs-soft)">
    <animateMotion dur="2s" begin="0.7s" repeatCount="indefinite" path="M 401 110 L 501 110"/>
  </circle>

  <!-- node 1 -->
  <g transform="translate(82,110)">
    <circle r="48" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.25">
      <animate attributeName="r" values="44;52;44" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.45;0.15" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <polygon points="0,-38 33,19 -33,19" fill="#0f172a" stroke="url(#qs-node1)" stroke-width="2" filter="url(#qs-glow)">
      <animate attributeName="stroke-opacity" values="1;0.45;1" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <text y="-6" text-anchor="middle" fill="#00d4ff" font-family="ui-monospace,monospace" font-size="11" font-weight="700">01</text>
    <text y="12" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Configure</text>
    <text y="28" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="9">env.js</text>
  </g>

  <!-- node 2 -->
  <g transform="translate(328,110)">
    <circle r="48" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.25">
      <animate attributeName="r" values="44;52;44" dur="2.4s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.45;0.15" dur="2.4s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <polygon points="0,-38 33,19 -33,19" fill="#0f172a" stroke="url(#qs-node2)" stroke-width="2" filter="url(#qs-glow)">
      <animate attributeName="stroke-opacity" values="0.45;1;0.45" dur="2s" begin="0.35s" repeatCount="indefinite"/>
    </polygon>
    <text y="-6" text-anchor="middle" fill="#818cf8" font-family="ui-monospace,monospace" font-size="11" font-weight="700">02</text>
    <text y="12" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Run</text>
    <text y="28" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="9">npm run dev</text>
  </g>

  <!-- node 3 -->
  <g transform="translate(574,110)">
    <circle r="48" fill="none" stroke="#34d399" stroke-width="1" opacity="0.25">
      <animate attributeName="r" values="44;52;44" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.45;0.15" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <polygon points="0,-38 33,19 -33,19" fill="#0f172a" stroke="url(#qs-node3)" stroke-width="2" filter="url(#qs-glow)">
      <animate attributeName="stroke-opacity" values="0.45;1;0.45" dur="2s" begin="0.7s" repeatCount="indefinite"/>
    </polygon>
    <text y="-6" text-anchor="middle" fill="#34d399" font-family="ui-monospace,monospace" font-size="11" font-weight="700">03</text>
    <text y="12" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Provision</text>
    <text y="28" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="9">public.users</text>
  </g>

  <text x="82" y="192" text-anchor="middle" fill="#475569" font-family="ui-monospace,monospace" font-size="10">~2 min</text>
  <text x="328" y="192" text-anchor="middle" fill="#475569" font-family="ui-monospace,monospace" font-size="10">~1 min</text>
  <text x="574" y="192" text-anchor="middle" fill="#475569" font-family="ui-monospace,monospace" font-size="10">~3 min</text>
</svg>
