<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" role="img" aria-label="Quick start: Configure, Run, Provision">
  <defs>
    <linearGradient id="qs-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030712"/><stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="qs-beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0070c0" stop-opacity="0"/><stop offset="50%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="qs-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="820" height="260" rx="16" fill="url(#qs-bg)" stroke="#1e3a5f"/>
  <g opacity="0.1" stroke="#00d4ff" stroke-width="0.5">
    <path d="M0 65 H820 M0 130 H820 M0 195 H820"/><path d="M205 0 V260 M410 0 V260 M615 0 V260"/>
  </g>
  <path d="M16 48 H42 M16 48 V74 M804 48 H778 M804 48 V74" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
  <rect x="0" width="820" height="2" fill="url(#qs-beam)" opacity="0.18">
    <animate attributeName="y" values="-4;264;-4" dur="5s" repeatCount="indefinite"/>
  </rect>
  <rect x="2" y="2" width="816" height="256" rx="14" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.15">
    <animate attributeName="opacity" values="0.08;0.35;0.08" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <text x="410" y="30" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="10" letter-spacing="2">ONBOARDING PIPELINE</text>
  <text x="410" y="46" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">Configure env.js &#8594; Run dev server &#8594; Provision user row</text>

  <!-- progress bar -->
  <rect x="80" y="218" width="660" height="6" rx="3" fill="#1e293b"/>
  <rect x="80" y="218" height="6" rx="3" fill="url(#qs-beam)">
    <animate attributeName="width" values="0;220;220;440;440;660;660;0" keyTimes="0;0.18;0.28;0.48;0.58;0.88;0.96;1" dur="12s" repeatCount="indefinite"/>
  </rect>
  <text x="410" y="240" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="8">
    <animate attributeName="opacity" values="1;1;0;1;1;0;1;1" keyTimes="0;0.08;0.12;0.14;0.42;0.46;0.48;1" dur="12s" repeatCount="indefinite"/>
    STATUS: copying env.example.js ...
  </text>
  <text x="518" y="240" fill="#00d4ff" font-family="ui-monospace,monospace" font-size="8" opacity="0">
    <animate attributeName="opacity" values="0;0;1;0;1;0;0;0" keyTimes="0;0.08;0.1;0.12;0.14;0.16;0.42;1" dur="12s" repeatCount="indefinite"/>
    |
  </text>
  <text x="410" y="240" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="8" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0;0;0" keyTimes="0;0.28;0.32;0.46;0.5;0.96;1;1" dur="12s" repeatCount="indefinite"/>
    STATUS: npm run dev serving localhost:3000
  </text>
  <text x="410" y="240" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="8" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1;1;0;0" keyTimes="0;0.56;0.6;0.68;0.72;0.9;0.94;1" dur="12s" repeatCount="indefinite"/>
    STATUS: Auth user + public.users row &#8594; dashboard unlocked
  </text>

  <path d="M 155 128 L 255 128" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <path d="M 401 128 L 501 128" fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <path d="M 155 128 L 255 128" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="6 8" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.22;0.24;0.38;0.4;1" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dashoffset" values="28;0" dur="0.8s" repeatCount="indefinite"/>
  </path>
  <path d="M 401 128 L 501 128" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="6 8" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1;1;0;0" keyTimes="0;0.48;0.5;0.52;0.54;0.72;0.74;1" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dashoffset" values="28;0" dur="0.8s" repeatCount="indefinite"/>
  </path>

  <!-- transit chevrons -->
  <polygon points="0,-4 8,0 0,4" fill="#00d4ff" opacity="0">
    <animateMotion dur="0.9s" repeatCount="indefinite" path="M 155 128 L 255 128"/>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.22;0.24;0.38;0.4;1" dur="12s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="0,-4 8,0 0,4" fill="#38bdf8" opacity="0">
    <animateMotion dur="0.9s" repeatCount="indefinite" path="M 401 128 L 501 128"/>
    <animate attributeName="opacity" values="0;0;0;0;1;1;0;0" keyTimes="0;0.48;0.5;0.52;0.54;0.72;0.74;1" dur="12s" repeatCount="indefinite"/>
  </polygon>

  <!-- payload morphs by phase -->
  <g filter="url(#qs-glow)">
    <rect width="52" height="22" rx="4" fill="#0f172a" stroke="#00d4ff" stroke-width="1.5">
      <animate attributeName="x" values="56;56;302;302;548;548;56" keyTimes="0;0.18;0.28;0.48;0.58;0.88;1" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="y" values="117;117;117;117;117;117;117" dur="12s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text font-family="ui-monospace,monospace" font-size="8" fill="#00d4ff" text-anchor="middle">
    <animate attributeName="x" values="82;82;328;328;574;574;82" keyTimes="0;0.18;0.28;0.48;0.58;0.88;1" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="y" values="131;131;131;131;131;131;131" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0;0;0;0;1" keyTimes="0;0.16;0.2;0.44;0.48;0.86;1" dur="12s" repeatCount="indefinite"/>
    env.js
  </text>
  <text font-family="ui-monospace,monospace" font-size="8" fill="#38bdf8" text-anchor="middle" opacity="0">
    <animate attributeName="x" values="82;82;328;328;574;574;82" keyTimes="0;0.18;0.28;0.48;0.58;0.88;1" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="y" values="131;131;131;131;131;131;131" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;1;0;0;0" keyTimes="0;0.26;0.3;0.46;0.5;0.86;1" dur="12s" repeatCount="indefinite"/>
    :3000
  </text>
  <text font-family="ui-monospace,monospace" font-size="8" fill="#34d399" text-anchor="middle" opacity="0">
    <animate attributeName="x" values="82;82;328;328;574;574;82" keyTimes="0;0.18;0.28;0.48;0.58;0.88;1" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="y" values="131;131;131;131;131;131;131" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.56;0.6;0.68;0.72;0.9;1" dur="12s" repeatCount="indefinite"/>
    admin row
  </text>
  <circle r="4" fill="#00d4ff" opacity="0.35">
    <animate attributeName="cx" values="82;82;328;328;574;574;82" keyTimes="0;0.18;0.28;0.48;0.58;0.88;1" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="128;128;128;128;128;128;128" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#a855f7" opacity="0.25">
    <animate attributeName="cx" values="78;78;324;324;570;570;78" keyTimes="0;0.18;0.28;0.48;0.58;0.88;1" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="128;128;128;128;128;128;128" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- step 1 -->
  <g transform="translate(82,128)">
    <circle r="54" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0.5;0.5;0;0;0;0;0.5" keyTimes="0;0.26;0.3;0.88;0.92;0.96;1" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="r" values="48;56;48" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <rect x="-62" y="-50" width="124" height="100" rx="10" fill="#0f172a" stroke="#00d4ff" stroke-width="2">
      <animate attributeName="stroke-opacity" values="1;1;0.25;0.25;0.25;0.25;1" keyTimes="0;0.28;0.32;0.88;0.92;0.96;1" dur="12s" repeatCount="indefinite"/>
    </rect>
    <text y="-28" text-anchor="middle" fill="#00d4ff" font-family="ui-monospace,monospace" font-size="9">STEP 1 / ACTIVE</text>
    <text y="-28" text-anchor="middle" fill="#475569" font-family="ui-monospace,monospace" font-size="9" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;0" keyTimes="0;0.28;0.32;0.88;0.92;0.96;1" dur="12s" repeatCount="indefinite"/>
      STEP 1 / DONE
    </text>
    <text y="-8" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Configure</text>
    <text y="10" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="9">cp env.example.js</text>
    <text y="24" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="8">SUPABASE_URL + ANON_KEY</text>
    <text y="42" text-anchor="middle" fill="#34d399" font-family="ui-monospace,monospace" font-size="8" opacity="0">
      <animate attributeName="opacity" values="1;1;0;0;0;0;0" keyTimes="0;0.26;0.3;0.88;0.92;0.96;1" dur="12s" repeatCount="indefinite"/>
      &#10003; secrets loaded
    </text>
  </g>

  <!-- step 2 -->
  <g transform="translate(328,128)">
    <circle r="54" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0;0.5;0.5;0;0;0" keyTimes="0;0.28;0.32;0.66;0.7;0.96;1" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="r" values="48;56;48" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <rect x="-62" y="-50" width="124" height="100" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.25;0.25;1;1;0.25;0.25;0.25" keyTimes="0;0.28;0.32;0.68;0.72;0.96;1" dur="12s" repeatCount="indefinite"/>
    </rect>
    <text y="-28" text-anchor="middle" fill="#475569" font-family="ui-monospace,monospace" font-size="9" opacity="0">
      <animate attributeName="opacity" values="1;1;0;0;0;0;1" keyTimes="0;0.28;0.32;0.48;0.52;0.96;1" dur="12s" repeatCount="indefinite"/>
      STEP 2 / WAIT
    </text>
    <text y="-28" text-anchor="middle" fill="#38bdf8" font-family="ui-monospace,monospace" font-size="9" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0;0" keyTimes="0;0.28;0.32;0.66;0.7;0.96;1" dur="12s" repeatCount="indefinite"/>
      STEP 2 / ACTIVE
    </text>
    <text y="-8" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Run</text>
    <text y="10" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="9">npm run dev</text>
    <text y="24" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="8">partials + static assets</text>
    <text y="42" text-anchor="middle" fill="#34d399" font-family="ui-monospace,monospace" font-size="8" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0;0" keyTimes="0;0.48;0.52;0.66;0.7;0.96;1" dur="12s" repeatCount="indefinite"/>
      &#10003; login.html reachable
    </text>
  </g>

  <!-- step 3 -->
  <g transform="translate(574,128)">
    <circle r="54" fill="none" stroke="#34d399" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;0.5;0.5;0" keyTimes="0;0.56;0.6;0.68;0.72;0.9;1" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="r" values="48;56;48" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <rect x="-62" y="-50" width="124" height="100" rx="10" fill="#0f172a" stroke="#34d399" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.25;0.25;0.25;0.25;1;1;0.25" keyTimes="0;0.56;0.6;0.68;0.72;0.92;1" dur="12s" repeatCount="indefinite"/>
    </rect>
    <text y="-28" text-anchor="middle" fill="#34d399" font-family="ui-monospace,monospace" font-size="9" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.68;0.72;0.76;0.8;0.92;1" dur="12s" repeatCount="indefinite"/>
      STEP 3 / ACTIVE
    </text>
    <text y="-8" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Provision</text>
    <text y="10" text-anchor="middle" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="9">Auth user + SQL insert</text>
    <text y="24" text-anchor="middle" fill="#64748b" font-family="ui-monospace,monospace" font-size="8">public.users (role)</text>
    <text y="42" text-anchor="middle" fill="#34d399" font-family="ui-monospace,monospace" font-size="8" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.68;0.72;0.76;0.8;0.92;1" dur="12s" repeatCount="indefinite"/>
      &#10003; RLS allows data
    </text>
  </g>

  <text x="82" y="200" text-anchor="middle" fill="#475569" font-family="ui-monospace,monospace" font-size="9">~2 min</text>
  <text x="328" y="200" text-anchor="middle" fill="#475569" font-family="ui-monospace,monospace" font-size="9">~1 min</text>
  <text x="574" y="200" text-anchor="middle" fill="#475569" font-family="ui-monospace,monospace" font-size="9">~3 min</text>
</svg>
