name: Backup production database

on:
  schedule:
    # 1st of each month at 03:00 UTC (08:30 IST)
    - cron: "0 3 1 * *"
  workflow_dispatch:

concurrency:
  group: prod-db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client jq

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Backup prod and upload to Google Drive
        env:
          PROD_DB_URL: ${{ secrets.PROD_DB_URL }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_DRIVE_BACKUP_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_BACKUP_FOLDER_ID }}
        run: bash scripts/backup-prod-to-drive.sh
