name: Merge

run-name: Merge to ${{ github.event.pull_request.base.ref }}

on:
  pull_request:
    types: [closed]
    branches:
      - staging
      - main

permissions:
  contents: read

jobs:
  merge:
    name: Merge complete
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Log merge
        run: |
          echo "PR #${{ github.event.pull_request.number }} merged into ${{ github.event.pull_request.base.ref }}"
          echo "Commit: ${{ github.event.pull_request.merge_commit_sha }}"

  build-and-deploy:
    name: Build and deploy
    needs: merge
    if: github.event.pull_request.merged == true
    uses: ./.github/workflows/deploy-pages.yml
    with:
      target: ${{ github.event.pull_request.base.ref == 'staging' && 'staging' || 'prod' }}
      sha: ${{ github.event.pull_request.merge_commit_sha }}
    secrets: inherit
