name: Merge

run-name: Merge to ${{ github.event.pull_request.base.ref }}

on:
  pull_request:
    types: [closed]
    branches: [staging, main]

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  merge:
    name: Merge complete
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Record merge and upload deploy metadata
        run: |
          echo "PR #${{ github.event.pull_request.number }} merged into ${{ github.event.pull_request.base.ref }}"
          echo "Commit: ${{ github.event.pull_request.merge_commit_sha }}"
          printf '{"target":"%s","sha":"%s","branch":"%s"}\n' \
            "${{ github.event.pull_request.base.ref == 'staging' && 'staging' || 'prod' }}" \
            "${{ github.event.pull_request.merge_commit_sha }}" \
            "${{ github.event.pull_request.base.ref }}" > deploy-meta.json

      - uses: actions/upload-artifact@v4
        with:
          name: deploy-meta
          path: deploy-meta.json
          retention-days: 1
