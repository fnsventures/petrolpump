name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
      - staging
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

concurrency:
  group: supabase-functions-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy functions (${{ github.ref_name == 'staging' && 'staging' || 'prod' }})
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'staging' && 'staging' || 'prod' }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF must be set in the GitHub environment." >&2
            exit 1
          fi
          for fn in get-dashboard-data get-reports-data get-pl-data invoice-documents; do
            if [ -d "supabase/functions/${fn}" ]; then
              echo "Deploying ${fn}…"
              supabase functions deploy "${fn}" --project-ref "${SUPABASE_PROJECT_REF}"
            fi
          done
