name: Deploy GitHub Pages

on:
  workflow_run:
    workflows: [Merge]
    types: [completed]
  workflow_dispatch:
    inputs:
      target:
        required: true
        type: choice
        options: [staging, prod]
      sha:
        required: false
        type: string
        description: Commit to deploy (defaults to branch HEAD)

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

jobs:
  prepare:
    name: Prepare deploy
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.name == 'Merge')
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.resolve.outputs.target }}
      sha: ${{ steps.resolve.outputs.sha }}
      deploy: ${{ steps.resolve.outputs.deploy }}
    steps:
      - if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        continue-on-error: true
        id: meta
        with:
          name: deploy-meta
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ inputs.sha != '' && inputs.sha || github.sha }}" >> "$GITHUB_OUTPUT"
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.meta.outcome }}" = "success" ]; then
            echo "target=$(python3 -c "import json; print(json.load(open('deploy-meta.json'))['target'])")" >> "$GITHUB_OUTPUT"
            echo "sha=$(python3 -c "import json; print(json.load(open('deploy-meta.json'))['sha'])")" >> "$GITHUB_OUTPUT"
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build site
    needs: prepare
    if: needs.prepare.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.target }}
    env:
      TARGET: ${{ needs.prepare.outputs.target }}
      DEPLOY_SHA: ${{ needs.prepare.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Build and package
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          bash .github/scripts/pages-deploy.sh build "$TARGET"
          mkdir -p bundle
          cp -a _site bundle/_site
          cp .github/scripts/pages-deploy.sh bundle/pages-deploy.sh

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle
          path: bundle/
          retention-days: 1

  deploy:
    name: Deploy to ${{ needs.prepare.outputs.target == 'staging' && 'staging' || 'production' }}
    needs: [prepare, build]
    if: needs.prepare.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      - uses: actions/download-artifact@v4
        with:
          name: deploy-bundle
          path: bundle

      - name: Update pages-state branch
        working-directory: bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TARGET: ${{ needs.prepare.outputs.target }}
          DEPLOY_SHA: ${{ needs.prepare.outputs.sha }}
        run: bash pages-deploy.sh save-state "$TARGET" "$DEPLOY_SHA"
