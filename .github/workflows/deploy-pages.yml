name: Deploy GitHub Pages

run-name: Deploy to ${{ (github.event_name == 'workflow_dispatch' && inputs.target || (github.ref == 'refs/heads/staging' && 'staging' || 'prod')) == 'staging' && 'staging' || 'production' }}

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      target:
        required: true
        type: choice
        options:
          - staging
          - prod
      sha:
        required: false
        type: string
        description: Commit to deploy (defaults to branch HEAD)

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target || (github.ref == 'refs/heads/staging' && 'staging' || 'prod') }}
    env:
      TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || (github.ref == 'refs/heads/staging' && 'staging' || 'prod') }}
      DEPLOY_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.sha != '' && inputs.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Build site
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: bash .github/scripts/pages-deploy.sh build "$TARGET"

      - name: Stage deploy script
        run: mkdir -p _deploy && cp .github/scripts/pages-deploy.sh _deploy/pages-deploy.sh

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/upload-artifact@v4
        with:
          name: site-state
          path: _site
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: deploy-script
          path: _deploy/pages-deploy.sh
          retention-days: 1

  deploy:
    name: Deploy to ${{ (github.event_name == 'workflow_dispatch' && inputs.target || (github.ref == 'refs/heads/staging' && 'staging' || 'prod')) == 'staging' && 'staging' || 'production' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || (github.ref == 'refs/heads/staging' && 'staging' || 'prod') }}
      DEPLOY_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.sha != '' && inputs.sha || github.sha }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      - uses: actions/download-artifact@v4
        with:
          name: site-state
          path: _site

      - uses: actions/download-artifact@v4
        with:
          name: deploy-script
          path: _deploy

      - name: Update pages-state branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash _deploy/pages-deploy.sh save-state "$TARGET" "$DEPLOY_SHA"
