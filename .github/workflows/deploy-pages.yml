name: Deploy

run-name: >-
  ${{
    github.event_name == 'push' && github.ref_name == 'staging' &&
      format('Staging-{0}', github.run_number) ||
    github.event_name == 'push' && github.ref_name == 'main' &&
      format('Prod-{0}', github.run_number) ||
    format('Manual-{0}-{1}', inputs.target, github.run_number)
  }}

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:
    inputs:
      target:
        required: true
        type: choice
        options: [staging, prod]
      sha:
        required: false
        type: string
        description: Commit to deploy (defaults to staging or main branch HEAD)

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  prepare:
    name: >-
      ${{
        github.event_name == 'workflow_dispatch' && 'Override' ||
        github.ref_name == 'staging' && 'Rehearse' ||
        'Brief'
      }}
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.resolve.outputs.target }}
      sha: ${{ steps.resolve.outputs.sha }}
      deploy: ${{ steps.resolve.outputs.deploy }}
    steps:
      - if: github.event_name == 'workflow_dispatch' && inputs.sha == ''
        name: >-
          ${{ inputs.target == 'staging' && 'Scout' || 'Locate' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target == 'staging' && 'staging' || 'main' }}
          fetch-depth: 1

      - if: github.event_name == 'workflow_dispatch' && inputs.sha == ''
        name: Trace
        id: branch_head
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - id: resolve
        name: >-
          ${{
            (github.event_name == 'workflow_dispatch' && inputs.target == 'staging' ||
              github.ref_name == 'staging') && 'Aim' || 'Lock'
          }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.sha }}" ]; then
              sha="${{ inputs.sha }}"
            else
              sha="${{ steps.branch_head.outputs.sha }}"
            fi
            echo "target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
            echo "sha=${sha}" >> "$GITHUB_OUTPUT"
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "target=staging" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "target=prod" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: >-
      ${{ needs.prepare.outputs.target == 'staging' && 'Assemble' || 'Forge' }}
    needs: prepare
    if: needs.prepare.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.prepare.outputs.target }}
    env:
      TARGET: ${{ needs.prepare.outputs.target }}
      DEPLOY_SHA: ${{ needs.prepare.outputs.sha }}
    steps:
      - name: Pull
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: >-
          ${{ needs.prepare.outputs.target == 'staging' && 'Patch' || 'Compile' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          bash .github/scripts/pages-deploy.sh build "$TARGET"
          mkdir -p bundle
          cp -a _site bundle/_site
          cp .github/scripts/pages-deploy.sh bundle/pages-deploy.sh

      - name: Link
        uses: actions/configure-pages@v5

      - name: >-
          ${{ needs.prepare.outputs.target == 'staging' && 'Sandbox' || 'Stage' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Pack
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle
          path: bundle/
          retention-days: 1

  deploy:
    name: >-
      ${{ needs.prepare.outputs.target == 'staging' && 'Preview' || 'Release' }}
    needs: [prepare, build]
    if: needs.prepare.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: >-
          ${{ needs.prepare.outputs.target == 'staging' && 'Push' || 'Launch' }}
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Unpack
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle
          path: bundle

      - name: >-
          ${{ needs.prepare.outputs.target == 'staging' && 'Bookmark' || 'Archive' }}
        working-directory: bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TARGET: ${{ needs.prepare.outputs.target }}
          DEPLOY_SHA: ${{ needs.prepare.outputs.sha }}
        run: bash pages-deploy.sh save-state "$TARGET" "$DEPLOY_SHA"
