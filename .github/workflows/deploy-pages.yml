name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

# One deployable queue: staging and prod never deploy at the same time.
concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/staging' && 'staging' || 'prod' }}
    env:
      TARGET: ${{ github.ref == 'refs/heads/staging' && 'staging' || 'prod' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build site
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: bash .github/scripts/build-pages-site.sh "$TARGET"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload site state
        uses: actions/upload-artifact@v4
        with:
          name: site-state
          path: _site
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TARGET: ${{ github.ref == 'refs/heads/staging' && 'staging' || 'prod' }}
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Save site state
        uses: actions/download-artifact@v4
        with:
          name: site-state
          path: _site

      - name: Update pages-state branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash .github/scripts/save-pages-state.sh "$TARGET" "${{ github.sha }}"
