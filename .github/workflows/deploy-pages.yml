name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

# Serialize prod/staging deploys so keep_files merges never overlap.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write runtime env config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          APP_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'staging' }}
        run: |
          cat <<EOF > js/env.js
          window.__APP_CONFIG__ = {
            SUPABASE_URL: "${SUPABASE_URL}",
            SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY}",
            APP_ENV: "${APP_ENV}",
          };
          EOF

      - name: Remove custom domain for staging
        if: github.ref == 'refs/heads/staging'
        run: rm -f CNAME

      - name: Prepare site artifact
        run: |
          mkdir -p _site
          if [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            bash .github/scripts/prepare-pages-site.sh _site staging
          else
            bash .github/scripts/prepare-pages-site.sh _site
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
