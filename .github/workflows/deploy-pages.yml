name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/staging' && 'staging' || 'prod' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write runtime env config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          APP_ENV: ${{ github.ref == 'refs/heads/staging' && 'staging' || 'prod' }}
        run: |
          cat > js/env.js <<EOF
          window.__APP_CONFIG__ = {
            SUPABASE_URL: "${SUPABASE_URL}",
            SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY}",
            APP_ENV: "${APP_ENV}",
          };
          EOF
          sed -i '/^js\/env\.js$/d' .gitignore

      - name: Stamp deploy (force gh-pages commit each run)
        run: echo "${{ github.sha }} $(date -u +%Y-%m-%dT%H:%M:%SZ)" > .deploy-meta

      - name: Remove custom domain for staging
        if: github.ref == 'refs/heads/staging'
        run: rm -f CNAME

      - name: Deploy staging
        if: github.ref == 'refs/heads/staging'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          destination_dir: staging
          keep_files: true
          enable_jekyll: false
          exclude_assets: .github,supabase,scripts,docs

      - name: Deploy production
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true
          enable_jekyll: false
          exclude_assets: .github,supabase,scripts,docs
