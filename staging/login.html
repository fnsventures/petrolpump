<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login · Bishnupriya Fuels</title>
    <link rel="icon" href="assets/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/login.css" />
    <script defer src="js/vendor/supabase-login.min.js"></script>
    <script defer src="js/env.js"></script>
    <script defer src="js/errorHandler.js"></script>
    <script defer src="js/cache.js"></script>
    <script defer src="js/utils.js?v=9"></script>
    <script defer src="js/supabase.js"></script>
    <script defer src="js/auth.js"></script>
  </head>
  <body class="login-page">
    <main class="login-card card">
      <header class="login-brand">
        <span class="login-logo" aria-hidden="true">
          <picture>
            <source srcset="assets/logo-104.webp" type="image/webp" />
            <img
              src="assets/logo-104.png"
              alt=""
              class="login-logo-img"
              width="104"
              height="104"
              decoding="async"
              fetchpriority="high"
            />
          </picture>
        </span>
        <div class="login-brand-text">
          <h1 class="login-brand-title">
            <span class="login-brand-primary">Bishnupriya Fuels</span>
            <span class="login-brand-venture">— a F&amp;S Ventures</span>
          </h1>
          <p class="login-brand-dealer">Authorized BPCL Dealer</p>
          <p class="login-brand-portal"><span>Operator Portal</span></p>
        </div>
      </header>

      <p class="login-intro">Sign in to manage daily operations, credit, billing, and reports.</p>

      <form id="login-form" class="form login-form" autocomplete="on" novalidate>
        <div class="login-field">
          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="operator@fnsventures.in"
            autocomplete="username"
            inputmode="email"
            spellcheck="false"
            autofocus
            required
          />
        </div>

        <div class="login-field">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Enter password"
            autocomplete="current-password"
            minlength="6"
            required
          />
        </div>

        <button type="submit" id="login-button">Sign in</button>
        <p class="login-forgot">
          <a href="#" id="forgot-password-link">Forgot password?</a>
        </p>
        <p id="login-error" class="login-error hidden" role="alert" aria-live="polite"></p>
      </form>
    </main>
    <footer class="app-footer app-footer--minimal">
      <p class="footer-copyright">© 2025 F&S Ventures. All rights reserved.</p>
    </footer>
  </body>
</html>
