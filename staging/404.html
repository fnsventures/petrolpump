<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found · Bishnupriya Fuels</title>
    <link rel="icon" href="assets/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="stylesheet" href="css/base.css" />
    <style>
      .not-found {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      .not-found-card {
        max-width: 28rem;
        padding: var(--space-6);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        position: relative;
        overflow: hidden;
      }
      .not-found-card::before {
        content: "";
        display: block;
        height: 3px;
        margin: calc(-1 * var(--space-6) - 3px) calc(-1 * var(--space-6)) var(--space-4);
        background: linear-gradient(
          90deg,
          var(--bpcl-blue) 0%,
          var(--bpcl-blue) 38%,
          var(--bpcl-yellow) 38%,
          var(--bpcl-yellow) 100%
        );
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      }
      .not-found-logo {
        width: var(--station-logo-size-xl, 6.5rem);
        height: var(--station-logo-size-xl, 6.5rem);
        margin: 0 auto 1.25rem;
        object-fit: contain;
      }
      .not-found h1 {
        margin: 0 0 0.5rem;
        font-size: var(--heading-2xl);
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.02em;
      }
      .not-found p {
        margin: 0 0 1.5rem;
        color: var(--text-muted);
        line-height: 1.55;
      }
      .not-found-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
      }
      .not-found-actions a {
        display: inline-block;
        padding: 0.65rem 1.25rem;
        border-radius: var(--radius-sm);
        text-decoration: none;
        font-weight: 600;
        font-size: var(--text-base);
        transition: background var(--transition-fast), box-shadow var(--transition-fast);
      }
      .not-found-actions .primary {
        background: var(--bpcl-blue);
        color: #fff;
      }
      .not-found-actions .primary:hover {
        background: var(--bpcl-blue-dark);
        box-shadow: var(--shadow-sm);
      }
      .not-found-actions .secondary {
        background: var(--surface);
        color: var(--bpcl-blue);
        border: 1px solid var(--border);
      }
      .not-found-actions .secondary:hover {
        background: var(--bpcl-blue-soft);
      }
    </style>
  </head>
  <body class="app-page">
    <main class="not-found">
      <div class="not-found-card">
        <picture>
          <source srcset="assets/logo-104.webp" type="image/webp" />
          <img
            src="assets/logo-104.png"
            alt="Bishnupriya Fuels"
            class="not-found-logo station-logo station-logo--xl"
            width="104"
            height="104"
            decoding="async"
          />
        </picture>
        <h1>Page not found</h1>
        <p>The page you requested does not exist or may have moved.</p>
        <div class="not-found-actions">
          <a class="primary" href="dashboard.html">Go to dashboard</a>
          <a class="secondary" href="index.html">Home</a>
        </div>
      </div>
    </main>
  </body>
</html>
